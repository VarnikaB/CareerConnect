{% extends "base.html" %}

{% block title %}Delete Comment - CareerConnect{% endblock %}

{% block content %}
<div class="content-wrapper" style="max-width: 500px;">
    <div class="card border-danger">
        <div class="card-body p-4 text-center">
            <i class="bi bi-exclamation-triangle text-danger" style="font-size: 3rem;"></i>
            <h4 class="fw-bold mt-3">Delete Comment</h4>
            <p class="text-muted">Are you sure you want to delete this comment?</p>

            <div class="card bg-light border-0 mb-4">
                <div class="card-body p-3">
                    <p class="mb-0 text-start">{{ comment.content }}</p>
                </div>
            </div>

            <form action="{{ url_for('comments.delete_comment', post_id=post_id, comment_id=comment_id) }}" method="POST">
                {{ form.hidden_tag() }}
                <div class="d-flex gap-2 justify-content-center">
                    <button type="submit" class="btn btn-danger">
                        <i class="bi bi-trash me-1"></i>Delete Comment
                    </button>
                    <a href="{{ url_for('comments.comment', post_id=post_id) }}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
