{% extends "base.html" %}

{% block title %}Access Denied{% endblock %}

{% block content %}
<div class="content-wrapper text-center" style="padding-top: 5rem;">
    <i class="bi bi-shield-lock" style="font-size: 4rem; color: var(--cc-text-muted);"></i>
    <h1 class="display-4 fw-bold mt-3">403</h1>
    <p class="fs-5 text-muted">You don't have permission to access this page.</p>
    <a href="{{ url_for('main.feed') }}" class="btn btn-primary mt-3">
        <i class="bi bi-house me-1"></i>Back to Feed
    </a>
</div>
{% endblock %}
