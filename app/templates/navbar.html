<style>
    .navbar-light .navbar-nav .nav-link {
        color: white;
        transition: color 0.3s;
    }
    .navbar-light .navbar-nav .nav-link:focus,
    .navbar-light .navbar-nav .nav-link:hover {
        color: lightcoral;
    }
    .profile-img {
        background-color: #2aabd2;
        transition: background-color 0.3s;
    }
    .profile-img:hover {
        background-color: #2e6da4;
    }
</style>

<nav class="navbar navbar-expand-lg navbar-light bg-primary">
    <a class="navbar-brand text-warning" href="{{ url_for('main.welcome') }}">CareerConnect</a>

    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav"
        aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ml-auto">
            {% if current_user.is_authenticated %}

            <li class="nav-item">
                <a class="nav-link" href="{{ url_for('main.feed') }}">Feed</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="{{ url_for('questions.questions') }}">Questions</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="{{ url_for('search.search') }}">Search</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="{{ url_for('chat.all_chats_with_people') }}">Chat</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="{{ url_for('posts.create_post') }}">Post</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="{{ url_for('auth.logout') }}">Logout</a>
            </li>

            <li class="nav-item">
                <a class="nav-link profile-img" href="{{ url_for('users.profile', username=current_user.username) }}" style="border-radius: 50%; border: 1px solid white">{{ current_user.username[:3] }}</a>
            </li>

            {% else %}

            <li class="nav-item">
                <a class="nav-link" href="{{ url_for('auth.login') }}">Login</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="{{ url_for('auth.register') }}">Register</a>
            </li>
            {% endif %}
        </ul>
    </div>
</nav>
